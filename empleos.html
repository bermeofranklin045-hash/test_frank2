            <p>Explora miles de oportunidades laborales y encuentra el empleo que mejor se adapte a tus

            <form role="search">

                    <button type="submit">Buscar</button>
                </div>
                <div>
                    <select class="job-filter-select" name="categoria" id="filter-categoria">

                        <option value="desarrollo">Desarrollo de Software</option>
                        <option value="diseño">Diseño Gráfico</option>

                    </select>
                    <select class="job-filter-select" name="ubicacion" id="filter-location">

                        <option value="remoto">Remoto</option>
                        <option value="presencial">Presencial</option>

                    <select class="job-filter-select" name="tipo">

                        <option value="contrato">Contrato</option>

                </div>
